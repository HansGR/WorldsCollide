name: CI

on:
  push:
  pull_request:

jobs:
  rom-guard:
    name: ROM safety guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if ROM files are tracked
        run: |
          set -e
          rom_files=$(git ls-files | grep -iE '\.(smc|sfc)$' || true)
          if [ -n "$rom_files" ]; then
            echo "::error::ROM files must never be committed (legal requirement):"
            echo "$rom_files"
            exit 1
          fi
          # No file-size check on this branch: it intentionally tracks large
          # reference files (claude_reference/, LocationRandomizer-WC.xlsm).

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Syntax check all modules
        run: python -m compileall -q .
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: CLI smoke test
        run: python wc.py -h
